services:

  # ───────────────────────────────────────────────────────────────────────────
  # Infrastructure
  # ───────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-studentmanagement}
      POSTGRES_USER: ${POSTGRES_USER:-studentmanagement}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studentmanagement}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - student-management-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studentmanagement -d studentmanagement"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - student-management-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - student-management-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ───────────────────────────────────────────────────────────────────────────
  # Backend — startup sırası: backend → mcp → agent
  # ───────────────────────────────────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: src/StudentManagement.Api/Dockerfile
    restart: unless-stopped
    ports:
      - "5100:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AllowedOrigin: ${ALLOWED_ORIGIN:-http://localhost}
      Database__MigrateOnStartup: "true"
      Database__SeedOnStartup: "true"
      Agent__BaseUrl: "http://agent:8080"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-studentmanagement};Username=${POSTGRES_USER:-studentmanagement};Password=${POSTGRES_PASSWORD:-studentmanagement}"
      ConnectionStrings__Mongo: "mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongo:27017/student_management?authSource=admin"
      ConnectionStrings__MongoLog: "mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongo:27017?authSource=admin"
      ConnectionStrings__Redis: ${REDIS_CONNECTION:-redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - student-management-net

  mcp:
    build:
      context: .
      dockerfile: src/StudentManagement.MCP/Dockerfile
    restart: unless-stopped
    ports:
      - "5300:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Api__BaseUrl: "http://backend:8080"
    depends_on:
      - backend
    networks:
      - student-management-net

  agent:
    build:
      context: .
      dockerfile: src/StudentManagement.Agent/Dockerfile
    restart: unless-stopped
    ports:
      - "5200:8080"
    env_file:
      - path: .env.docker
        required: false          # Dosya yoksa sıfır hata — Azure özellikleri devre dışı kalır
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Mcp__ServerUrl: "http://mcp:8080"
    depends_on:
      - mcp
    networks:
      - student-management-net

  # ───────────────────────────────────────────────────────────────────────────
  # Frontend  (nginx — /api ve /hubs → backend:8080'e proxy)
  # ───────────────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: student-management-ui
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - agent
    networks:
      - student-management-net

volumes:
  postgres_data:
  mongo_data:
  redis_data:

networks:
  student-management-net:
    driver: bridge
